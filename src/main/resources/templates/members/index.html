<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>会員一覧</title>
</head>

<body>

<h1>会員一覧</h1>
<form th:action="@{/logout}" method="post">
    <button type="submit">ログアウト</button>
</form>

<p>
    <a th:href="@{/members/new}">新規登録</a>
</p>
<form th:action="@{/members}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="名前またはメールアドレスで検索">
    <button type="submit">検索</button>
    <a th:href="@{/members}">クリア</a>
</form>
<table border="1">
    <tr>
        <th>ID</th>
        <th>名前</th>
        <th>メールアドレス</th>
        <th>年齢</th>
        <th>操作</th>
    </tr>

    <tr th:each="member : ${members}">
        <td th:text="${member.id}"></td>
        <td th:text="${member.name}"></td>
        <td th:text="${member.email}"></td>
        <td th:text="${member.age}"></td>
        <td>
            <a th:href="@{/members/{id}(id=${member.id})}">詳細</a>
        </td>
    </tr>
</table>


<p th:if="${#lists.isEmpty(members)}">
    該当する会員が見つかりませんでした。
</p>
</body>

</html>
